name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # macOS runner: the RAM-disk temp path (hdiutil) and the build target are macOS-only.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt -w:"
            echo "$unformatted"
            exit 1
          fi

      - name: vet
        run: go vet ./...

      - name: test
        run: go test ./...

      - name: build
        run: go build ./...
