name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # macOS runner: the RAM-disk temp path (hdiutil) and the build target are macOS-only.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: gofmt
        run: test -z "$(gofmt -l .)" || { gofmt -l .; echo "run: gofmt -w ."; exit 1; }

      - name: vet
        run: go vet ./...

      - name: test
        run: go test ./...

      - name: build
        run: go build ./...
