name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release + upload archives

jobs:
  goreleaser:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser needs full history + tags for the changelog

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Only needed for the Homebrew tap publish; a PAT with repo scope on
          # the homebrew-tap repository. Remove the `brews:` block in
          # .goreleaser.yaml if you don't want a tap.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
